<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Study Portal | Smart Learner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { 
            --primary: #6b21a8; 
            --primary-light: #a855f7; 
            --accent: #d8b4fe;
            --bg: #f8fafc; 
            --card-bg: #ffffff; 
            --text-main: #0f172a; 
            --text-sub: #64748b; 
            --yt-red: #ff0000; 
            --shadow: 0 10px 25px rgba(107, 33, 168, 0.1); 
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            margin: 0; padding: 0; user-select: none; -webkit-touch-callout: none; 
            color: var(--text-main); min-height: 100vh;
        }
        
        .screen { display: none; padding: 20px; box-sizing: border-box; min-height: 100vh; }
        .active { display: block; }

        .greeting-container {
            padding: 30px 10px 20px 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            animation: fadeIn 0.8s ease-out;
        }

        .user-avatar {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 26px;
            font-weight: 800;
            position: relative;
            z-index: 1;
            background: linear-gradient(135deg, #4c1d95, #a855f7, #1e40af, #4c1d95);
            background-size: 300% 300%;
            animation: avatarColorShift 8s infinite ease-in-out, avatarPulse 2s infinite ease-in-out;
            box-shadow: 0 0 20px rgba(107, 33, 168, 0.4);
        }

        .user-avatar::after {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            background: inherit;
            filter: blur(10px);
            opacity: 0.6;
            z-index: -1;
        }

        @keyframes avatarColorShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes avatarPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .greeting-text h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            color: var(--text-main);
        }

        .login-btn { 
            width: 100%; padding: 18px; 
            background: linear-gradient(135deg, var(--primary), var(--primary-light)); 
            color: white; border: none; border-radius: 18px; 
            font-weight: 700; font-size: 16px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(107, 33, 168, 0.2);
        }

        .subject-card { 
            background: var(--card-bg); border-radius: 28px; overflow: hidden;
            box-shadow: var(--shadow); margin-bottom: 25px; border: 1px solid rgba(107,33,168,0.05);
        }
        .banner-box { width: 100%; height: 160px; background: #eee; }
        .banner-box img { width: 100%; height: 100%; object-fit: cover; }
        .info-box { padding: 20px; display: flex; justify-content: space-between; align-items: center; }

        .card { 
            background: var(--card-bg); padding: 22px; border-radius: 20px; 
            box-shadow: var(--shadow); margin-bottom: 15px; 
            display: flex; align-items: center; justify-content: space-between; 
            border: 1px solid rgba(107,33,168,0.05);
        }

        .video-box { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            background: #000; border-radius: 25px; overflow: hidden; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        #player { width: 100%; height: 100%; position: absolute; }
        .click-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        
        .custom-controls { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(transparent, rgba(0,0,0,0.9)); 
            padding: 25px 20px 15px; z-index: 20; transition: 0.4s;
        }
        .custom-controls.hidden { opacity: 0; pointer-events: none; transform: translateY(10px); }

        .seek-bar-container { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-bottom: 12px; cursor: pointer; position: relative; }
        .seek-bar-progress { height: 100%; background: var(--primary-light); border-radius: 10px; width: 0%; position: relative; }
        .seek-bar-knob { width: 12px; height: 12px; background: white; border-radius: 50%; position: absolute; right: -6px; top: -4px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }

        .time-row { display: flex; align-items: center; justify-content: space-between; color: white; }
        .control-btn { background: none; border: none; color: white; cursor: pointer; display: flex; align-items: center; padding: 5px; }
        .control-btn i { font-size: 24px; }

        .center-controls {
            display: flex;
            align-items: center;
            gap: 25px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        #playPauseBtn i { font-size: 34px; }

        .speed-control-container { position: relative; display: flex; align-items: center; }
        .speed-dropdown {
            position: absolute; bottom: 50px; right: 0; background: rgba(15, 23, 42, 0.95);
            border-radius: 15px; display: none; flex-direction: column; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1); width: 100px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .speed-dropdown.show { display: flex; }
        .speed-opt { padding: 12px 15px; font-size: 14px; color: white; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; font-weight: 600; }
        .speed-opt:hover { background: var(--primary); }

        #speedToast {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white; padding: 8px 15px;
            border-radius: 20px; font-size: 14px; font-weight: 600; z-index: 30;
            display: none; pointer-events: none;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        input { width: 100%; padding: 18px; margin-bottom: 15px; border: 2px solid #e2e8f0; border-radius: 15px; box-sizing: border-box; font-size: 16px; outline: none; }
    </style>
</head>
<body>

<div id="masterAuthScreen" class="screen active">
    <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:80vh;">
        <div style="width:90%; max-width:380px; text-align:center;">
            <h2 style="color:var(--primary)">App Verification</h2>
            <input type="text" id="mUser" placeholder="Username">
            <input type="password" id="mPass" placeholder="Password">
            <button class="login-btn" onclick="masterAuth()">තහවුරු කරන්න</button>
        </div>
    </div>
</div>

<div id="loginScreen" class="screen">
    <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:80vh;">
        <div style="width:90%; max-width:380px; text-align:center;">
            <h2 style="color:var(--primary)">Student Login</h2>
            <input type="text" id="loginName" placeholder="ඔබේ නම">
            <input type="password" id="loginPass" placeholder="මුරපදය">
            <button class="login-btn" onclick="login()">ඇතුල් වන්න</button>
        </div>
    </div>
</div>

<div id="mainMenuScreen" class="screen">
    <div class="greeting-container">
        <div class="user-avatar" id="userInitial">U</div>
        <div class="greeting-text">
            <h2 id="helloMsg">Hello!</h2>
        </div>
    </div>
    <p style="padding-left:10px; font-weight:700; color:var(--text-sub); font-size:12px; text-transform:uppercase; letter-spacing:1px;">විෂයයන් තෝරන්න</p>
    <div id="subjectList"></div>
</div>

<div id="topicsScreen" class="screen">
    <div onclick="showScreen('mainMenuScreen')" style="display:flex; align-items:center; gap:10px; padding:15px 0; color:var(--primary); font-weight:700; cursor:pointer;">
        <i class="material-icons">arrow_back</i> <span id="subTitle">Back</span>
    </div>
    <div id="topicsList"></div>
</div>

<div id="playerScreen" class="screen">
    <div id="videoListContainer">
        <div onclick="showScreen('topicsScreen')" style="display:flex; align-items:center; gap:10px; padding:15px 0; color:var(--primary); font-weight:700; cursor:pointer;">
            <i class="material-icons">arrow_back</i> <span id="lessonTitle">වීඩියෝ ලැයිස්තුව</span>
        </div>
        <div id="multiVideoList"></div>
    </div>

    <div id="playerSection" style="display:none;">
        <div onclick="hidePlayer()" style="display:flex; align-items:center; gap:10px; padding:15px 0; color:var(--primary); font-weight:700; cursor:pointer;">
            <i class="material-icons">arrow_back</i> <span id="activeVideoTitle">නැවතීමට</span>
        </div>
        <div class="video-box" id="videoContainer">
            <div id="player"></div>
            <div id="speedToast">2X Speed</div>
            <div class="click-layer" onclick="handleTap()"></div>
            <div class="custom-controls" id="controlBar">
                <div class="seek-bar-container" onclick="handleSeek(event)">
                    <div class="seek-bar-progress" id="seekBarProgress"><div class="seek-bar-knob"></div></div>
                </div>
                <div class="time-row">
                    <div style="font-size:12px; font-weight:500;">
                        <span id="currentTime">0:00</span> / <span id="totalDuration">0:00</span>
                    </div>

                    <div class="center-controls">
                        <button class="control-btn" onclick="skip(-10)"><i class="material-icons">replay_10</i></button>
                        <button class="control-btn" onclick="togglePlay(event)" id="playPauseBtn"><i class="material-icons">play_arrow</i></button>
                        <button class="control-btn" onclick="skip(10)"><i class="material-icons">forward_10</i></button>
                    </div>

                    <div style="display:flex; align-items:center; gap:10px;">
                        <button class="control-btn"><i class="material-icons">volume_up</i></button>
                        <button class="control-btn" onclick="toggleFullScreen(event)"><i class="material-icons">fullscreen</i></button>
                        <div class="speed-control-container">
                            <button class="control-btn" onclick="toggleSpeedDropdown(event)"><i class="material-icons">more_vert</i></button>
                            <div class="speed-dropdown" id="speedMenu">
                                <div class="speed-opt" onclick="setSpeed(0.5)">0.5x</div>
                                <div class="speed-opt" onclick="setSpeed(1)">Normal</div>
                                <div class="speed-opt" onclick="setSpeed(1.25)">1.25x</div>
                                <div class="speed-opt" onclick="setSpeed(1.5)">1.5x</div>
                                <div class="speed-opt" onclick="setSpeed(2)">2.0x</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyApozqbVy4DFupEKafsU_oeC9RUAq1ljuU",
        authDomain: "tech-590c8.firebaseapp.com",
        databaseURL: "https://tech-590c8-default-rtdb.firebaseio.com",
        projectId: "tech-590c8",
        storageBucket: "tech-590c8.firebasestorage.app",
        messagingSenderId: "379663698743",
        appId: "1:379663698743:web:7fba89d9f7b231ca6828b2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let player, hideTimeout;
    let currentVideos = [];
    let isSpacePressed = false;
    let lastUserSpeed = 1;

    window.onload = () => {
        const isVerified = localStorage.getItem('isAppVerified');
        const savedUser = localStorage.getItem('studyUser');
        if (!isVerified) showScreen('masterAuthScreen');
        else if (!savedUser) showScreen('loginScreen');
        else { currentUser = JSON.parse(savedUser); loadDashboard(); }
    };

    window.addEventListener('keydown', (e) => {
        if (document.getElementById('playerSection').style.display === 'block' && player) {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!isSpacePressed) {
                    isSpacePressed = true;
                    this.spaceTimer = setTimeout(() => {
                        if (isSpacePressed) {
                            lastUserSpeed = player.getPlaybackRate() || 1;
                            player.setPlaybackRate(2);
                            document.getElementById('speedToast').style.display = 'block';
                        }
                    }, 500);
                }
            }
        }
    });

    window.addEventListener('keyup', (e) => {
        if (e.code === 'Space' && player) {
            e.preventDefault();
            clearTimeout(this.spaceTimer);
            if (isSpacePressed) {
                if (player.getPlaybackRate() !== 2 || document.getElementById('speedToast').style.display === 'none') {
                    const state = player.getPlayerState();
                    state === 1 ? player.pauseVideo() : player.playVideo();
                } else {
                    player.setPlaybackRate(lastUserSpeed);
                    document.getElementById('speedToast').style.display = 'none';
                }
            }
            isSpacePressed = false;
        }
    });

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function masterAuth() {
        const enteredUser = document.getElementById("mUser").value.trim();
        const enteredPass = document.getElementById("mPass").value.trim();
        db.ref('master_settings').once('value', snap => {
            const data = snap.val();
            const validUser = data ? data.username : "ulindu";
            const validPass = data ? data.password : "2007";
            if (enteredUser === validUser && enteredPass === validPass) {
                const newRandomPass = Math.floor(1000 + Math.random() * 9000).toString();
                db.ref('master_settings').update({ password: newRandomPass }).then(() => {
                    localStorage.setItem('isAppVerified', 'true');
                    showScreen('loginScreen');
                });
            } else { alert("වැරදියි!"); }
        });
    }

    function login() {
        const u = document.getElementById("loginName").value.trim();
        const p = document.getElementById("loginPass").value.trim();
        db.ref('students').once('value', snap => {
            const data = snap.val();
            for(let key in data) {
                if(data[key].name === u && data[key].password === p) {
                    currentUser = {id: key, ...data[key]};
                    localStorage.setItem('studyUser', JSON.stringify(currentUser));
                    loadDashboard(); return;
                }
            }
            alert("නම හෝ මුරපදය වැරදියි!");
        });
    }

    function loadDashboard() {
        if (!currentUser) return;

        // 1. Check for deletion in real-time
        db.ref(`students/${currentUser.id}`).on('value', snap => {
            if (!snap.exists()) {
                // If user is deleted from database, logout immediately
                alert("ඔබේ ගිණුම අක්‍රීය කර ඇත!");
                localStorage.removeItem('studyUser');
                currentUser = null;
                location.reload(); // Refresh to go back to login screen
            }
        });

        document.getElementById("helloMsg").innerText = "Hello, " + currentUser.name + "!";
        document.getElementById("userInitial").innerText = currentUser.name.charAt(0).toUpperCase();
        showScreen('mainMenuScreen');
        
        const list = document.getElementById("subjectList");
        db.ref(`students/${currentUser.id}/access`).on('value', s => {
            const acc = s.val(); 
            if(!acc) return;
            list.innerHTML = "";
            const subData = [
                {id: 'et', name: 'Engineering Technology', img: 'et.jpeg', tag: ['et', 'both', 'all']},
                {id: 'sft', name: 'Science for Technology', img: 'sft.jpeg', tag: ['sft', 'both', 'all']},
                {id: 'ict', name: 'Information Technology', img: 'ict.jpeg', tag: ['ict', 'all']}
            ];
            subData.forEach(sub => {
                if(sub.tag.includes(acc)) {
                    list.innerHTML += `<div class="subject-card" onclick="openStream('${sub.id}')"><div class="banner-box"><img src="${sub.img}" onerror="this.src='https://via.placeholder.com/400x150?text=${sub.name}'"></div><div class="info-box"><h3 style="margin:0">${sub.name}</h3><i class="material-icons" style="color:var(--primary)">arrow_forward</i></div></div>`;
                }
            });
        });
    }

    function openStream(type) {
        document.getElementById("subTitle").innerText = type.toUpperCase();
        showScreen('topicsScreen');
        db.ref(`students/${currentUser.id}/allowedLessons/${type}`).on('value', s => {
            const allowed = s.val() || {};
            db.ref(`studyData/${type}`).once('value', ds => {
                const lessons = ds.val();
                const container = document.getElementById("topicsList");
                container.innerHTML = "";
                for(let name in lessons) {
                    if(allowed[name]) {
                        container.innerHTML += `<div class="card" onclick="showVideoList('${name}', ${JSON.stringify(lessons[name].videos).replace(/"/g, '&quot;')})"><span>${name}</span> <i class="material-icons" style="color:var(--primary)">play_circle_filled</i></div>`;
                    }
                }
            });
        });
    }

    function showVideoList(title, videos) {
        document.getElementById("lessonTitle").innerText = title;
        currentVideos = Object.values(videos);
        showScreen('playerScreen');
        document.getElementById("videoListContainer").style.display = "block";
        document.getElementById("playerSection").style.display = "none";
        const list = document.getElementById("multiVideoList");
        list.innerHTML = "";
        currentVideos.forEach((v, index) => {
            list.innerHTML += `<div class="card" onclick="playThisVideo(${index})"><span>${v.title}</span> <i class="material-icons" style="color:var(--primary)">videocam</i></div>`;
        });
    }

    function playThisVideo(index) {
        const vid = currentVideos[index];
        document.getElementById("activeVideoTitle").innerText = vid.title;
        document.getElementById("videoListContainer").style.display = "none";
        document.getElementById("playerSection").style.display = "block";
        if (!player) {
            player = new YT.Player('player', { videoId: vid.id, playerVars: { 'autoplay': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0, 'playsinline': 1 }, events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange } });
        } else { player.loadVideoById(vid.id); }
    }

    function hidePlayer() { if(player) player.pauseVideo(); document.getElementById("playerSection").style.display = "none"; document.getElementById("videoListContainer").style.display = "block"; }
    function onPlayerReady() { setInterval(updateUI, 500); }
    function onPlayerStateChange(e) {
        const btn = document.getElementById("playPauseBtn");
        if (e.data === YT.PlayerState.PLAYING) { btn.innerHTML = '<i class="material-icons">pause</i>'; resetTimer(); }
        else { btn.innerHTML = '<i class="material-icons">play_arrow</i>'; showControls(); }
    }

    function skip(seconds) { if (player && player.getCurrentTime) { player.seekTo(player.getCurrentTime() + seconds, true); } }
    function handleTap() { const cb = document.getElementById("controlBar"); document.getElementById("speedMenu").classList.remove("show"); cb.classList.contains("hidden") ? showControls() : hideControls(); }
    function showControls() { document.getElementById("controlBar").classList.remove("hidden"); resetTimer(); }
    function hideControls() { if (player && player.getPlayerState() === 1) document.getElementById("controlBar").classList.add("hidden"); }
    function resetTimer() { clearTimeout(hideTimeout); if (player && player.getPlayerState() === 1) hideTimeout = setTimeout(hideControls, 4000); }
    function togglePlay(e) { e.stopPropagation(); if(player) (player.getPlayerState() === 1) ? player.pauseVideo() : player.playVideo(); }
    function toggleFullScreen(e) { e.stopPropagation(); var container = document.getElementById("videoContainer"); if (!document.fullscreenElement) container.requestFullscreen(); else document.exitFullscreen(); }
    function toggleSpeedDropdown(e) { e.stopPropagation(); document.getElementById("speedMenu").classList.toggle("show"); }
    function setSpeed(rate) { if(player && player.setPlaybackRate) { player.setPlaybackRate(rate); lastUserSpeed = rate; document.getElementById("speedMenu").classList.remove("show"); } }
    function handleSeek(e) { e.stopPropagation(); if(player) { var rect = e.currentTarget.getBoundingClientRect(); var pos = (e.clientX - rect.left) / rect.width; player.seekTo(player.getDuration() * pos, true); } }
    
    function updateUI() { 
        if (player && player.getCurrentTime) { 
            var curr = player.getCurrentTime(), dur = player.getDuration(); 
            document.getElementById("currentTime").innerText = formatTime(curr);
            document.getElementById("totalDuration").innerText = formatTime(dur);
            if (dur > 0) { 
                var p = (curr / dur) * 100; 
                document.getElementById("seekBarProgress").style.width = p + "%"; 
            } 
        } 
    }
    function formatTime(t) { t = Math.round(t); var h = Math.floor(t / 3600), m = Math.floor((t % 3600) / 60), s = t % 60; if(h>0) return h + ":" + (m<10?"0":"") + m + ":" + (s<10?"0":"") + s; return m + ":" + (s < 10 ? "0" : "") + s; }
</script>
</body>
</html>
